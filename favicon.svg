<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="#0d1117"/>
  <!-- Outer circuit ring -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="url(#g2)" stroke-width="0.5" opacity="0.5"/>
  <!-- Inner hex shape -->
  <polygon points="16,5 25,10.5 25,21.5 16,27 7,21.5 7,10.5" fill="none" stroke="url(#g)" stroke-width="0.8" opacity="0.4"/>
  <!-- Circuit nodes -->
  <circle cx="16" cy="5" r="1" fill="#00d4ff" opacity="0.7"/>
  <circle cx="25" cy="10.5" r="1" fill="#7c3aed" opacity="0.7"/>
  <circle cx="7" cy="10.5" r="1" fill="#7c3aed" opacity="0.7"/>
  <circle cx="25" cy="21.5" r="1" fill="#00d4ff" opacity="0.5"/>
  <circle cx="7" cy="21.5" r="1" fill="#00d4ff" opacity="0.5"/>
  <circle cx="16" cy="27" r="1" fill="#7c3aed" opacity="0.7"/>
  <!-- E letterform - geometric, angular -->
  <path d="M12 11 L20 11 M12 11 L12 21 M12 16 L19 16 M12 21 L20 21" fill="none" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
