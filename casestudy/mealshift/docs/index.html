<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>MealShift API Documentation</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; font-family: 'DM Sans', sans-serif; }
    /* MealShift branded header */
    .ms-header {
      background: #1a1a2e;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid #FF5362;
    }
    .ms-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ms-logo-text {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }
    .ms-logo-text span { color: #FF5362; }
    .ms-badge {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 4px 12px;
      border-radius: 20px;
      color: #00ff9d;
      background: rgba(0,255,157,0.08);
      border: 1px solid rgba(0,255,157,0.2);
    }
    .ms-nav {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .ms-nav a {
      font-size: 13px;
      color: #999;
      text-decoration: none;
      font-weight: 500;
    }
    .ms-nav a:hover { color: #fff; }
    .ms-download {
      padding: 8px 16px;
      background: #FF5362;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      font-family: 'Space Mono', monospace;
    }
    .ms-download:hover { background: #e0434f; }
    /* Footer */
    .ms-footer {
      background: #1a1a2e;
      padding: 24px 32px;
      text-align: center;
      border-top: 1px solid #30363d;
    }
    .ms-footer p {
      font-size: 12px;
      color: #666;
      margin: 0;
      font-family: 'Space Mono', monospace;
    }
    .ms-footer a { color: #FF5362; text-decoration: none; }
  </style>
</head>
<body>
  <div class="ms-header">
    <div class="ms-logo">
      <div class="ms-logo-text">Meal<span>Shift</span> API</div>
      <span class="ms-badge">v2.0</span>
    </div>
    <div class="ms-nav">
      <a href="#section/Overview">Overview</a>
      <a href="#section/Authentication">Auth</a>
      <a href="#tag/Access">Endpoints</a>
      <a href="#section/Webhooks">Webhooks</a>
      <a href="openapi.yaml" download class="ms-download">Download OpenAPI Spec</a>
    </div>
  </div>

  <redoc spec-url='openapi.yaml'
    hide-download-button
    theme='{
      "colors": {
        "primary": { "main": "#FF5362" },
        "success": { "main": "#00ff9d" },
        "warning": { "main": "#f59e0b" },
        "error": { "main": "#ef4444" },
        "text": { "primary": "#1a1a2e", "secondary": "#666" }
      },
      "typography": {
        "fontSize": "14px",
        "fontFamily": "DM Sans, sans-serif",
        "headings": { "fontFamily": "DM Sans, sans-serif", "fontWeight": "700" },
        "code": { "fontFamily": "Space Mono, monospace", "fontSize": "13px" }
      },
      "sidebar": {
        "backgroundColor": "#fafafa",
        "textColor": "#333",
        "activeTextColor": "#FF5362"
      },
      "rightPanel": {
        "backgroundColor": "#1a1a2e",
        "textColor": "#c9d1d9"
      },
      "schema": {
        "nestedBackground": "#f5f5f5"
      }
    }'
  ></redoc>

  <div class="ms-footer">
    <p>MealShift API v2.0 - Documentation built by <a href="https://elektraos.dev">ElektraOS.dev</a> - Confidential</p>
  </div>

  <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>
</body>
</html>
